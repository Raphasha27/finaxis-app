name: FinAxis CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build_and_test: 
    name: Build & Test (Java/Maven)
    runs-on: ubuntu-latest
    image:
    postgres:15-alpine
        env: 
    POSTGRES_DB: banking_db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
      redis: 
    image:
    redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version:
   cache: maven

      - name: Build Shared Kernel
      run: mvn clean install -pl shared-kernel -am

      - name: Build and Test All Modules
      run: mvn install
      env: 
    SPRING_DATASOURCE_URL:
    jdbc:postgresql://localhost:5432/banking_db
        SPRING_DATASOURCE_USERNAME: user
        SPRING_DATASOURCE_PASSWORD: password
        SPRING_REDIS_HOST: localhost

  security_scan: 
    name: Security Scan (Trivy)
    needs: build_and_test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  docker_build: 
    name: Docker Build (Verification)
    needs: build_and_test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

      - name: Build Infrastructure Images (Verification)
      run: |
        echo "Verifying Docker infrastructure..."
        docker-compose config > /dev/null