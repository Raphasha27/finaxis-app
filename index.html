<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinAxis | Stable Premium</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --secondary: #10b981; --bg: #f8fafc; --text: #0f172a; --text-soft: #64748b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: #e2e8f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: var(--text); }
        .mobile-container { width: 375px; height: 812px; background: var(--bg); border-radius: 40px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.2); position: relative; overflow: hidden; border: 8px solid #1e293b; }
        #root { height: 100%; }
        .loading-state { height: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; background: white; }
        .spinner { width: 30px; height: 30px; border: 3px solid #f3f3f3; border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* App Styles */
        .screen { height: 100%; display: flex; flex-direction: column; }
        .content { flex: 1; overflow-y: auto; padding-bottom: 100px; }
        .header { padding: 24px; display: flex; justify-content: space-between; align-items: center; }
        .wallet { margin: 0 20px 20px; padding: 24px; background: #0f172a; border-radius: 24px; color: white; }
        .btn { width: 100%; padding: 16px; border-radius: 16px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 15px; }
        .btn-primary { background: var(--primary); color: white; }
        .nav { position: absolute; bottom: 0; left: 0; right: 0; height: 80px; background: white; border-top: 1px solid #eee; display: flex; justify-content: space-around; align-items: center; padding-bottom: 15px; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: 700; color: #94a3b8; gap: 4px; }
        .nav-item.active { color: var(--primary); }
        .scan-btn { width: 60px; height: 60px; background: var(--primary); border-radius: 30px; margin-top: -40px; border: 4px solid white; display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 8px 15px rgba(37,99,235,0.3); }
        
        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 20px; }
        .card { background: white; padding: 20px; border-radius: 20px; border: 1px solid #f1f5f9; text-align: center; }
        .icon-box { width: 44px; height: 44px; border-radius: 12px; margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; }
        .modal { position: absolute; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; display: flex; align-items: flex-end; }
        .sheet { background: white; width: 100%; padding: 32px; border-radius: 32px 32px 0 0; }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading-state">
            <div class="spinner"></div>
            <p style="font-weight: 700; color: #64748b">Initializing Ecosystem...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Svg = {
            Home: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>,
            Scan: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M7 12h10"/></svg>,
            Bot: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M12 8V4"/></svg>,
            User: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="7" r="4"/><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/></svg>
        };

        const App = () => {
            const [role, setRole] = useState(null);
            const [view, setView] = useState('home');
            const [balance, setBalance] = useState(1200);
            const [modal, setModal] = useState(null);

            if (!role) {
                return (
                    <div className="loading-state">
                        <h2 style={{fontWeight:800, fontSize:24, marginBottom:24}}>FinAxis Eco</h2>
                        <button className="btn btn-primary" style={{width:'80%', marginBottom:12}} onClick={() => setRole('user')}>I am an Attendee</button>
                        <button className="btn" style={{width:'80%', background:'#f1f5f9'}} onClick={() => setRole('admin')}>I am an Organizer</button>
                        <p style={{marginTop:30, fontSize:10, color:'#94a3b8', fontWeight:700, textTransform:'uppercase'}}>Created by Kid of Dynamics</p>
                    </div>
                );
            }

            return (
                <div className="screen">
                    <div className="content">
                        <div className="header">
                            <div>
                                <p style={{fontSize:12, color:'#64748b', margin:0}}>{role === 'admin' ? 'Admin Portal' : 'Event Active'}</p>
                                <h1 style={{fontSize:22, fontWeight:800, margin:0}}>Hi, Raphasha!</h1>
                            </div>
                            <div style={{color:'var(--primary)'}} onClick={() => setRole(null)}><Svg.User /></div>
                        </div>

                        <div className="wallet">
                            <p style={{fontSize:11, opacity:0.7, fontWeight:600}}>EVENT CREDITS</p>
                            <h2 style={{fontSize:32, fontWeight:800, margin:'4px 0'}}>R {balance.toLocaleString()}</h2>
                            <div style={{display:'inline-flex', padding:'6px 12px', background:'var(--primary)', borderRadius:20, fontSize:11, fontWeight:700, marginTop:10}} onClick={() => setBalance(b => b+500)}>+ Load Money</div>
                        </div>

                        <div className="card-grid">
                            <div className="card" onClick={() => setView('ai')}>
                                <div className="icon-box" style={{background:'#eff6ff', color:'var(--primary)'}}><Svg.Bot /></div>
                                <div style={{fontWeight:800, fontSize:13}}>Event AI</div>
                            </div>
                            <div className="card" onClick={() => setModal('scan')}>
                                <div className="icon-box" style={{background:'#fff7ed', color:'#f59e0b'}}><Svg.Scan /></div>
                                <div style={{fontWeight:800, fontSize:13}}>Scan Pay</div>
                            </div>
                        </div>

                        <div style={{padding:24}}>
                            <h3 style={{fontSize:16, fontWeight:800, marginBottom:16}}>Activity Feed</h3>
                            {[1,2].map(i => (
                                <div key={i} style={{display:'flex', justifyContent:'space-between', background:'white', padding:16, borderRadius:18, marginBottom:10, border:'1px solid #f1f5f9'}}>
                                    <div style={{fontWeight:700, fontSize:13}}>Digital Merch Shop</div>
                                    <div style={{fontWeight:800}}>-R 150</div>
                                </div>
                            ))}
                            <p style={{textAlign:'center', marginTop:20, fontSize:10, color:'#94a3b8', fontWeight:700, textTransform:'uppercase', opacity:0.5}}>Kid of Dynamics © 2026</p>
                        </div>
                    </div>

                    <div className="nav">
                        <div className={`nav-item ${view==='home'?'active':''}`} onClick={() => setView('home')}><Svg.Home /><span>Home</span></div>
                        <div className="scan-btn" onClick={() => setModal('scan')}><Svg.Scan /></div>
                        <div className={`nav-item ${view==='ai'?'active':''}`} onClick={() => setView('ai')}><Svg.Bot /><span>Butler</span></div>
                    </div>

                    {modal && (
                        <div className="modal" onClick={() => setModal(null)}>
                            <div className="sheet" onClick={e => e.stopPropagation()}>
                                <h2 style={{fontWeight:800, margin:0}}>Authorize Payment?</h2>
                                <p style={{color:'#64748b', fontSize:14, margin:'8px 0 24px'}}>Confirm instant ledger settlement.</p>
                                <button className="btn btn-primary" onClick={() => { setBalance(b => b-150); setModal(null); }}>Pay R 150.00</button>
                                <button className="btn" style={{marginTop:8}} onClick={() => setModal(null)}>Cancel</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
